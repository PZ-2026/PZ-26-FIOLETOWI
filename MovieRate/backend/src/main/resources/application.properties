spring.application.name=MovieRateBackend
server.address=0.0.0.0
server.port=8080

# Baza Danych PostgreSQL (domyślne porty lokalne)
spring.datasource.url=jdbc:postgresql://localhost:5432/movierate
spring.datasource.username=postgres
spring.datasource.password=admin

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Tryb inicjalizacji skryptów SQL (uruchomi schema.sql przy starcie pomijając ewentualne konflikty)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Seed danych startowych
app.seed.enabled=true

# Zwiększenie limitu rozmiaru żądania dla dużych obrazków base64
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=10MB
